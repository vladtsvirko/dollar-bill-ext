<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <div class="header-left">
        <span class="logo">$</span>
        <span class="title">Dollar Bill</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="enabled">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="freshness-bar" id="freshnessBar">
      <span class="freshness-dot"></span>
      <span id="freshnessText">Loading...</span>
    </div>

    <div class="rate-cards" id="rateCards">
      <div class="rate-card-skeleton">Loading rates...</div>
    </div>

    <div class="converter">
      <div class="converter-header">Quick Convert</div>
      <input type="text" id="converterInput" class="converter-input" placeholder="Type amount...">
      <div id="converterResult" class="converter-result"></div>
    </div>

    <div class="footer">
      <div class="site-indicator" id="siteIndicator"></div>
      <a href="#" id="settingsLink" class="settings-link">Settings</a>
    </div>
  </div>
  <script src="../lib/rates.js"></script>
  <script src="popup.js"></script>
</body>
</html>
