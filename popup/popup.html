<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <div class="header-left">
        <span class="logo">$</span>
        <span class="title">Dollar Bill</span>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <label class="toggle-switch">
          <input type="checkbox" id="enabled">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="source-bar" id="sourceBar">
      <div class="source-bar-left">
        <button class="source-trigger" id="sourceTrigger">
          <span class="source-dot"></span>
          <span class="source-name" id="sourceName">Loading...</span>
          <span class="source-chevron">&#9662;</span>
        </button>
        <span class="source-time" id="sourceTime"></span>
      </div>
      <button class="source-reload" id="sourceReload" title="Refresh rates">
        <span class="reload-icon">&#8635;</span>
      </button>
      <div class="source-dropdown" id="sourceDropdown"></div>
    </div>

    <div class="rate-cards" id="rateCards">
      <div class="rate-card-skeleton">Loading rates...</div>
    </div>

    <div class="section-divider">
      <div class="section-divider-line"></div>
      <span class="section-divider-label">Conversion pairs</span>
      <div class="section-divider-line"></div>
    </div>

    <div class="pairs-section" id="pairsSection">
      <div class="pairs-chips" id="pairChips"></div>
    </div>

    <div class="converter">
      <div class="converter-header">Quick Convert</div>
      <div class="converter-selects">
        <select id="converterFrom" class="converter-select"></select>
        <span class="converter-arrow">&rarr;</span>
        <select id="converterTo" class="converter-select"></select>
      </div>
      <input type="text" id="converterInput" class="converter-input" placeholder="Type amount...">
      <div id="converterResult" class="converter-result"></div>
    </div>

    <div class="footer">
      <div class="site-indicator" id="siteIndicator"></div>
      <a href="#" id="settingsLink" class="settings-link">Settings</a>
    </div>
  </div>
  <script src="../lib/rates.js"></script>
  <script src="popup.js"></script>
</body>
</html>
