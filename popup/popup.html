<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <div class="header-left">
        <img class="logo" src="../icons/icon128.png" alt="$">
        <span class="title">Dollar Bill</span>
      </div>
      <div class="header-right">
        <div class="theme-segmented" id="themeSegmented">
          <button class="theme-seg" data-theme-value="light" title="Light theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <button class="theme-seg" data-theme-value="" title="System preference">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </button>
          <button class="theme-seg" data-theme-value="dark" title="Dark theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="enabled">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="source-bar" id="sourceBar">
      <div class="source-bar-left">
        <button class="source-trigger" id="sourceTrigger">
          <span class="source-dot" id="sourceDot"></span>
          <span class="source-name" id="sourceName">Loading...</span>
          <span class="source-chevron">&#9662;</span>
        </button>
        <span class="source-time" id="sourceTime"></span>
      </div>
      <button class="source-reload" id="sourceReload" title="Refresh rates">
        <span class="reload-icon">&#8635;</span>
      </button>
      <div class="source-dropdown" id="sourceDropdown"></div>
      <div class="source-tooltip" id="sourceTooltip"></div>
    </div>

    <div class="conflict-banner" id="conflictBanner" style="display:none">
      <span class="conflict-banner-icon">&#9888;</span>
      <span class="conflict-banner-text" id="conflictBannerText">Some rates conflict between sources</span>
    </div>

    <div class="rate-cards" id="rateCards">
      <div class="rate-card-skeleton">Loading rates...</div>
    </div>

    <div class="section-divider">
      <div class="section-divider-line"></div>
      <span class="section-divider-label">Conversion pairs</span>
      <div class="section-divider-line"></div>
    </div>

    <div class="pairs-section" id="pairsSection">
      <div class="pairs-chips" id="pairChips"></div>
      <div class="add-pair-form" id="addPairForm"></div>
    </div>

    <div class="converter">
      <div class="converter-header">Quick Convert</div>
      <div class="converter-selects">
        <select id="converterFrom" class="converter-select"></select>
        <span class="converter-arrow">&rarr;</span>
        <select id="converterTo" class="converter-select"></select>
      </div>
      <input type="text" id="converterInput" class="converter-input" placeholder="Type amount...">
      <div id="converterResult" class="converter-result"></div>
    </div>

    <div class="footer">
      <div class="site-indicator" id="siteIndicator"></div>
      <a href="#" id="settingsLink" class="settings-link">Settings</a>
    </div>
  </div>
  <script src="../lib/currencies.js"></script>
  <script src="../lib/rate-sources.js"></script>
  <script src="../lib/settings.js"></script>
  <script src="../lib/rates.js"></script>
  <script src="../lib/ui-common.js"></script>
  <script src="popup.js"></script>
</body>
</html>
